name: Build Orange Cloud unlocked unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/ios/**'
      - 'scripts/build-unlocked-ipa-macos.sh'
      - '.github/workflows/build-unlocked-ipa.yml'

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euxo pipefail
          sudo xcode-select -s /Applications/Xcode.app || true
          xcodebuild -version

      - name: Build unsigned unlocked IPA
        shell: bash
        run: scripts/build-unlocked-ipa-macos.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeCloud-OpenSourceUnlocked-unsigned-ipa
          path: apps/ios/Orange Cloud/OrangeCloud-OpenSourceUnlocked-unsigned.ipa
          if-no-files-found: error
