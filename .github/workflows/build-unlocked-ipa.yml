name: Sync upstream and build Orange Cloud unlocked IPA

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 10:25 自动同步上游；有上游更新才构建。
    - cron: '25 2 * * *'
  push:
    branches: [ main ]
    paths-ignore:
      - 'orange-cloud-build-logs/**'

permissions:
  contents: write

env:
  UPSTREAM_REPO: chen2he/orange-cloud
  IPA_NAME: OrangeCloud-OpenSourceUnlocked-unsigned.ipa

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sync.outputs.sha }}
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - name: Checkout Ruawd repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Merge upstream main
        id: sync
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream main --tags
          before="$(git rev-parse HEAD)"
          git merge --no-edit upstream/main
          after="$(git rev-parse HEAD)"
          if [ "$before" != "$after" ]; then
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$after" >> "$GITHUB_OUTPUT"

  build-ios:
    needs: sync-upstream
    if: needs.sync-upstream.outputs.changed == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          ref: main
          path: workflow-repo
          persist-credentials: true

      - name: Checkout Orange Cloud source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.sync-upstream.outputs.sha }}
          path: orange-cloud

      - name: Xcode version
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p workflow-repo/orange-cloud-build-logs/${GITHUB_RUN_ID}
          xcodebuild -version | tee workflow-repo/orange-cloud-build-logs/${GITHUB_RUN_ID}/xcode-version.log
          xcodebuild -showsdks | tee -a workflow-repo/orange-cloud-build-logs/${GITHUB_RUN_ID}/xcode-version.log

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -o pipefail
          cd 'orange-cloud/apps/ios/Orange Cloud'
          xcodebuild \
            -project 'Orange Cloud.xcodeproj' \
            -scheme 'Orange Cloud' \
            -resolvePackageDependencies \
            -skipPackagePluginValidation \
            -skipMacroValidation 2>&1 | tee "$GITHUB_WORKSPACE/workflow-repo/orange-cloud-build-logs/${GITHUB_RUN_ID}/resolve.log"

      - name: Build unsigned unlocked app
        shell: bash
        run: |
          set -o pipefail
          cd 'orange-cloud/apps/ios/Orange Cloud'
          rm -rf build Payload "$IPA_NAME"
          xcodebuild build \
            -project 'Orange Cloud.xcodeproj' \
            -scheme 'Orange Cloud' \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_SWIFT_FLAGS='$(inherited) -D OPENSOURCE_UNLOCKED' \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) OPENSOURCE_UNLOCKED' 2>&1 | tee "$GITHUB_WORKSPACE/workflow-repo/orange-cloud-build-logs/${GITHUB_RUN_ID}/build.log"

          APP_PATH="$(find build -path '*Release-iphoneos/Orange Cloud.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo 'Orange Cloud.app not found' | tee -a "$GITHUB_WORKSPACE/workflow-repo/orange-cloud-build-logs/${GITHUB_RUN_ID}/build.log"
            find build -name '*.app' -type d -print | tee -a "$GITHUB_WORKSPACE/workflow-repo/orange-cloud-build-logs/${GITHUB_RUN_ID}/build.log"
            exit 1
          fi

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          find Payload -name '_CodeSignature' -type d -prune -exec rm -rf {} + || true
          find Payload -name 'embedded.mobileprovision' -type f -delete || true
          /usr/bin/zip -qry "$IPA_NAME" Payload
          ls -lh "$IPA_NAME" | tee -a "$GITHUB_WORKSPACE/workflow-repo/orange-cloud-build-logs/${GITHUB_RUN_ID}/build.log"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OrangeCloud-OpenSourceUnlocked-unsigned-ipa
          path: orange-cloud/apps/ios/Orange Cloud/OrangeCloud-OpenSourceUnlocked-unsigned.ipa
          if-no-files-found: error

      - name: Publish GitHub Release
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          TAG="orange-cloud-unlocked-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          IPA='orange-cloud/apps/ios/Orange Cloud/OrangeCloud-OpenSourceUnlocked-unsigned.ipa'
          gh release create "$TAG" "$IPA" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Orange Cloud unlocked unsigned IPA $TAG" \
            --notes "Auto-synced from ${UPSTREAM_REPO} and built with OPENSOURCE_UNLOCKED. Unsigned IPA for self-signing." \
            --latest=false

      - name: Commit build logs
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          cd workflow-repo
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add orange-cloud-build-logs/${GITHUB_RUN_ID} || true
          git diff --cached --quiet && exit 0
          git commit -m "ci: orange cloud build logs ${GITHUB_RUN_ID}"
          git push
